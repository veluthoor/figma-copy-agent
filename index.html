<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GT Copy Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 640px;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c8f135;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: #c8f135;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .field {
      margin-bottom: 20px;
    }

    .hint {
      font-size: 12px;
      color: #555;
      margin-top: 5px;
    }

    button {
      width: 100%;
      background: #c8f135;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      margin-top: 24px;
      font-size: 14px;
      color: #888;
      text-align: center;
      min-height: 20px;
    }

    #results {
      margin-top: 24px;
    }

    .result-item {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .result-original {
      font-size: 12px;
      color: #555;
      margin-bottom: 6px;
    }

    .result-suggestion {
      font-size: 15px;
      font-weight: 600;
      color: #c8f135;
      margin-bottom: 6px;
    }

    .result-reason {
      font-size: 13px;
      color: #888;
    }

    .summary {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #aaa;
    }

    .summary strong {
      color: #c8f135;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 28px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Game Theory</div>
    <h1>Copy Review Agent</h1>
    <p class="subtitle">Paste a Figma frame URL. Claude will review the copy and post suggestions as comments.</p>

    <hr class="divider" />

    <div class="field">
      <label>Figma Frame URL</label>
      <input type="text" id="figma_url" placeholder="https://www.figma.com/design/..." />
    </div>

    <div class="field">
      <label>PM Context <span style="color:#555">(optional)</span></label>
      <textarea id="pm_context" placeholder="e.g. This is the renewal flow for Academy plans (kids under 18, parent-managed)..."></textarea>
    </div>

    <div class="field">
      <label>Figma Token <span style="color:#555">(optional if set server-side)</span></label>
      <input type="password" id="figma_token" placeholder="figd_..." />
      <div class="hint">Settings → Security → Personal access tokens</div>
    </div>

    <button id="btn" onclick="runReview()">Review copy & post comments</button>

    <div id="status"></div>
    <div id="results"></div>
  </div>

  <script>
    async function runReview() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const results = document.getElementById('results');

      const figma_url = document.getElementById('figma_url').value.trim();
      const pm_context = document.getElementById('pm_context').value.trim();
      const figma_token = document.getElementById('figma_token').value.trim();

      if (!figma_url) {
        status.innerHTML = '<span class="error-msg">Please enter a Figma URL.</span>';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Reading design...';
      results.innerHTML = '';

      try {
        const res = await fetch('/review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ figma_url, pm_context, figma_token }),
        });

        const data = await res.json();

        if (!res.ok) {
          status.innerHTML = `<span class="error-msg">Error: ${data.detail}</span>`;
          return;
        }

        status.textContent = '';

        let html = `<div class="summary">
          Posted <strong>${data.posted} comments</strong> to Figma.
          ${data.errors.length > 0 ? `<br/><span style="color:#ff6b6b">${data.errors.length} failed.</span>` : ''}
        </div>`;

        for (const c of data.comments) {
          html += `<div class="result-item">
            <div class="result-original">Original: "${c.text}"</div>
            <div class="result-suggestion">${c.suggestion}</div>
            <div class="result-reason">${c.reason}</div>
          </div>`;
        }

        if (data.errors.length > 0) {
          html += '<div style="margin-top:12px">';
          for (const e of data.errors) {
            html += `<div class="error-msg">${e}</div>`;
          }
          html += '</div>';
        }

        results.innerHTML = html;

      } catch (err) {
        status.innerHTML = `<span class="error-msg">Request failed: ${err.message}</span>`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
